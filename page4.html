<!DOCTYPE html>
<html>
<head>
  <title>Progress Page</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    progress {
      width: 400px;
      height: 18px;
      appearance: none;
    }

    progress::-webkit-progress-bar {
      background-color: rgba(255, 255, 255, 0.3);
      border-radius: 999px;
    }

    progress::-webkit-progress-value {
      background-color: #6a90b2;
      border-radius: 999px;
    }
  </style>
</head>

<body>

  <img src="8e850e07f2b54d13cca2df44918bec6a (1).jpg" id="bg">

  <progress id="bar" value="0" max="100"></progress>

  <script>
    var width = 0;
    var bar = document.getElementById("bar");

    var interval = setInterval(function() {
      width = width + 1;
      bar.value = width;

      if (width >= 100) {
        clearInterval(interval);

        setTimeout(function() {
          window.location.href = "page41.html";
        }, 500);
      }
    }, 30);
  </script>

</body>
</html>
