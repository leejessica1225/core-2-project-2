<!DOCTYPE html>
<html>
<head>
  <title>Progress Page</title>

  <style>
    body {
      margin: 0;
      background-image: url("8e850e07f2b54d13cca2df44918bec6a (1).jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .bar {
      width: 400px;
      height: 18px;
      background-color: #e5e5ea;
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      width: 0%;
      height: 100%;
      background-color: #5a8dee;
      border-radius: 999px;
    }
  </style>
</head>

<body>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <script>
    var width = 0;
    var bar = document.getElementById("fill");

    var interval = setInterval(function() {
      width = width + 1;
      bar.style.width = width + "%";

      if (width >= 100) {
        clearInterval(interval);

        setTimeout(function() {
          window.location.href = "page41.html";
        }, 500);
      }
    }, 30);
  </script>

</body>
</html>
