<!DOCTYPE html>
<html>
<head>
  <title>별 켜기</title>
  <style>

    body {
      margin-top: 0px;
      margin-bottom: 0px;
      margin-left: 0px;
      margin-right: 0px;
    }

    .page {
      width: 100%;
      height: 100vh;
      position: relative;
      background-image: url("22b9dc20c0b15fec81a725ba7db205e0 (1).jpg");
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    .grid-overlay {
      position: absolute;
      top: 0px;
      left: 0px;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(255,182,193,0.15) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,182,193,0.15) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .all-stars {
      display: none;
    }

    @keyframes starGlow {
      0%   { text-shadow: 0px 0px 5px rgba(255,255,255,0.5), 0px 0px 10px rgba(255,255,255,0.3); }
      50%  { text-shadow: 0px 0px 15px white, 0px 0px 30px white, 0px 0px 45px rgba(255,255,255,0.5); }
      100% { text-shadow: 0px 0px 5px rgba(255,255,255,0.5), 0px 0px 10px rgba(255,255,255,0.3); }
    }

    .star {
      position: absolute;
      font-size: 30px;
      color: #ffe899;
      animation: starGlow 1.5s infinite;
    }

    .bulb-button {
      position: absolute;
      bottom: 120px;
      left: 120px;
      font-size: 80px;
      background: none;
      border: none;
      cursor: pointer;
      transform: rotate(-20deg);
      filter: drop-shadow(0px 0px 15px orange);
    }

  </style>
</head>
<body>
  <div class="page">

    <div class="grid-overlay"></div>

    <div class="all-stars" id="myStars">
      <div class="star" style="top:5%; left:45%;">★</div>
      <div class="star" style="top:3%; left:65%;">★</div>
      <div class="star" style="top:8%; left:30%;">★</div>
      <div class="star" style="top:12%; left:55%;">★</div>
      <div class="star" style="top:15%; left:80%;">★</div>
      <div class="star" style="top:18%; left:20%;">★</div>
      <div class="star" style="top:22%; left:70%;">★</div>
      <div class="star" style="top:25%; left:40%;">★</div>
      <div class="star" style="top:28%; left:85%;">★</div>
      <div class="star" style="top:30%; left:10%;">★</div>
      <div class="star" style="top:35%; left:60%;">★</div>
      <div class="star" style="top:38%; left:25%;">★</div>
      <div class="star" style="top:40%; left:75%;">★</div>
      <div class="star" style="top:42%; left:50%;">★</div>
      <div class="star" style="top:45%; left:90%;">★</div>
      <div class="star" style="top:48%; left:35%;">★</div>
      <div class="star" style="top:52%; left:68%;">★</div>
      <div class="star" style="top:55%; left:15%;">★</div>
      <div class="star" style="top:58%; left:82%;">★</div>
      <div class="star" style="top:60%; left:45%;">★</div>
      <div class="star" style="top:65%; left:55%;">★</div>
      <div class="star" style="top:70%; left:30%;">★</div>
      <div class="star" style="top:72%; left:78%;">★</div>
      <div class="star" style="top:75%; left:92%;">★</div>
      <div class="star" style="top:80%; left:62%;">★</div>
    </div>

    <button class="bulb-button" onclick="toggleStars()">💡</button>

  </div>

  <script>

    var starsOnOrOff = "off";

    function toggleStars() {
      if (starsOnOrOff == "off") {
        document.getElementById("myStars").style.display = "block";
        starsOnOrOff = "on";
      } else {
        document.getElementById("myStars").style.display = "none";
        starsOnOrOff = "off";
      }
    }

  </script>
</body>
</html>
