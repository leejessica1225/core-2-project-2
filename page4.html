<!DOCTYPE html>
<html>
<head>
  <title>Progress Page</title>

  <style>
    body {
      margin: 0;
      background-image: url("8e850e07f2b54d13cca2df44918bec6a (1).jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .progress-bar {
      width: 400px;
      height: 18px;
      background-color: #e5e5ea;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      width: 60%;
      height: 100%;
      background-color: #007aff;
      border-radius: 999px;
    }
  </style>
</head>

<body>
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
</body>
</html>
