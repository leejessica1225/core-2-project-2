<!DOCTYPE html>
<html>
<head>
  <title>Page 2</title>

  <style>
    @font-face {
      font-family: 'cactus';
      src: url('Cactus-Jack.ttf');
    }

    body {
      background-color: #f8f6ef;
      margin: 0;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: 'cactus';
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .img {
      width: 60px;
      display: none;
    }

    
    progress {
      display: none;
    }
  </style>
</head>

<body>

  
  <progress id="bar" value="0" max="6"></progress>

  
  <div class="row">
    <img src="Group 54.png" class="img">
    <img src="Group 55.png" class="img">
    <img src="Group 56.png" class="img">
    <img src="Group 57.png" class="img">
    <img src="Group 58.png" class="img">
  </div>

  <script>
    var bar = document.getElementById("bar");
    var imgs = document.getElementsByClassName("img");

    function update() {
      bar.value = bar.value + 1;

      imgs[bar.value - 1].style.display = "block";

      if (bar.value < bar.max) {
        setTimeout(update, 300);
      } else {
        setTimeout(function() {
          window.location.href = "page21.html";
        }, 500);
      }
    }

    update();
  </script>

</body>
</html>
