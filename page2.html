<!DOCTYPE html>
<html>
<head>
  <title>Search Page</title>

  <style>
    @font-face {
      font-family: 'cactus';
      src: url('Cactus-Jack.ttf');
    }

    body {
      background-color: white;
      text-align: center;
      margin-top: 120px;
      font-family: 'cactus';
    }

    input {
      width: 300px;
      height: 45px;
      font-size: 20px;
      padding-left: 10px;
      font-family: 'cactus';
      border: 2px solid black;
      border-radius: 8px;
    }

    button {
      height: 50px;
      font-size: 20px;
      margin-left: 10px;
      padding: 0 20px;
      font-family: 'cactus';
      border: 2px solid black;
      border-radius: 8px;
      background-color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <input id="search" type="text" placeholder="type something...">
  <button onclick="go()">search</button>

  <script>
    function go() {
      let word = document.getElementById("search").value;
      console.log(word);
    }
  </script>

</body>
</html>
