<!DOCTYPE html>
<html>
<head>
  <title>Search Page</title>

  <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #f7f3ea;
      text-align: center;
      margin-top: 120px;
      font-family: 'Gloria Hallelujah', cursive;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 30px;
    }

    input {
      width: 300px;
      height: 45px;
      font-size: 20px;
      padding-left: 10px;
      font-family: 'Gloria Hallelujah', cursive;
      border: 2px solid black;
      border-radius: 8px;
    }

    button {
      height: 50px;
      font-size: 20px;
      margin-left: 10px;
      padding: 0 20px;
      font-family: 'Gloria Hallelujah', cursive;
      border: 2px solid black;
      border-radius: 8px;
      background-color: white;
      cursor: pointer;
    }

    p {
      font-size: 24px;
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <h1>Search Here</h1>

  <input id="search" type="text" placeholder="type something...">
  <button onclick="showText()">search</button>

  <p id="result"></p>

  <script>
    function showText() {
      let word = document.getElementById("search").value;
      document.getElementById("result").innerText = "you searched: " + word;
    }
  </script>

</body>
</html>
