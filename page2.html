<!DOCTYPE html>
<html>
<head>
  <title>Search Page</title>

  <style>
    @font-face {
      font-family: 'cactus';
      src: url('Cactus-Jack.ttf');
    }

    body {
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'cactus';
      color: black;
    }

    .box {
      width: 600px;
      border: 2px solid black;
      padding: 20px 30px;
      font-size: 40px;
      display: flex;
      justify-content: space-between;  /* 핵심 */
      align-items: center;
    }

    input {
      border: none;
      outline: none;
      font-size: 40px;
      font-family: 'cactus';
      width: 70%;
    }

    input::placeholder {
      color: black;
      opacity: 0.5;
      font-family: 'cactus';
    }
  </style>
</head>
<body>

  <div class="box">
    <input type="text" placeholder="type something...">
    <span>search</span>
  </div>

</body>
</html>
