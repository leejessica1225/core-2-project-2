<!DOCTYPE html>
<html>
<head>
  <title>home</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #eeeeee;
    }

    .row {
      display: flex;
      gap: 0;
      align-items: center;
    }

    a {
      text-decoration: none;
    }

    .box {
      width: 150px;
      height: 150px;
      overflow: hidden;
      border: 1px solid black;
      box-sizing: border-box;
      transition: transform 0.3s ease;
      transform-origin: center center;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box:hover {
      transform: scale(1.2);
      z-index: 10;
    }

    .box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>

<body>

  <div class="row">

    <a href="page1.html">
      <div class="box">
        <img src="screenshot1.jpeg">
      </div>
    </a>

    <a href="page2.html">
      <div class="box">
        <img src="screenshot2.jpeg">
      </div>
    </a>

    <a href="page4.html">
      <div class="box">
        <img src="screenshot3.jpeg">
      </div>
    </a>

    <a href="page5.html">
      <div class="box">
        <img src="screenshot4.jpeg">
      </div>
    </a>

    <a href="page3.html">
      <div class="box">
        <img src="screenshot5.jpeg">
      </div>
    </a>

  </div>

</body>
</html>
