<!DOCTYPE html>
<html>
<head>
  <title>home</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .box {
      width: 150px;
      height: 150px;
      overflow: hidden;
      transition: 0.3s;
    }

    .box:hover {
      width: 180px;
      height: 180px;
    }

    .box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="row">

    <a href="page1.html">
      <div class="box"><img src="img1.jpg"></div>
    </a>

    <a href="page2.html">
      <div class="box"><img src="img2.jpg"></div>
    </a>

    <a href="page4.html">
      <div class="box"><img src="img3.jpg"></div>
    </a>

    <a href="page5.html">
      <div class="box"><img src="img4.jpg"></div>
    </a>

    <a href="page3.html">
      <div class="box"><img src="img5.jpg"></div>
    </a>

  </div>

</body>
</html>
