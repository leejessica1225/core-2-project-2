<!DOCTYPE html>
<html>
<head>
  <title>gallery</title>
  <style>

    body {
      background-color: blue;
      margin-top: 0px;
      margin-bottom: 0px;
      margin-left: 0px;
      margin-right: 0px;
      font-family: monospace;
      color: white;
    }

    .page {
      width: 100%;
      height: 100vh;
      position: relative;
    }

    .gallery-area {
      position: absolute;
      top: 100px;
      left: 100px;
      right: 100px;
      bottom: 80px;
    }

    .my-image {
      position: absolute;
      object-fit: cover;
    }

    .image-main {
      width: 520px;
      height: 430px;
      top: 30px;
      left: 200px;
      z-index: 3;
      background-color: #888888;
    }

    .image-top-left {
      width: 200px;
      height: 220px;
      top: 80px;
      left: 30px;
      z-index: 2;
      background-color: #cc6600;
    }

    .image-bottom-left {
      width: 220px;
      height: 220px;
      bottom: 40px;
      left: 0px;
      z-index: 2;
      background-color: #aabbcc;
    }

    .image-top-right {
      width: 200px;
      height: 220px;
      top: 60px;
      right: 0px;
      z-index: 2;
      background-color: #cc3300;
    }

    .image-bottom-right {
      width: 300px;
      height: 200px;
      bottom: 40px;
      right: 0px;
      z-index: 1;
      background: linear-gradient(to right, #cc88ff, #ff44aa);
    }

    .image-bottom-center1 {
      width: 160px;
      height: 160px;
      bottom: 40px;
      left: 220px;
      z-index: 2;
      background-color: #dddddd;
    }

    .image-bottom-center2 {
      width: 240px;
      height: 160px;
      bottom: 40px;
      left: 380px;
      z-index: 2;
      background-color: #ccddee;
    }

    .white-box {
      position: absolute;
      width: 160px;
      height: 120px;
      top: 10px;
      right: 170px;
      z-index: 2;
      background-color: #ddddff;
    }

  </style>
</head>
<body>
  <div class="page">

    <svg onclick="goLeft()" style="position:absolute; top:50%; left:20px; cursor:pointer;" width="40" height="20" viewBox="0 0 80 40">
      <polygon points="0,20 28,0 28,40" fill="white"/>
      <rect x="28" y="18" width="52" height="4" fill="white"/>
    </svg>

    <svg onclick="goRight()" style="position:absolute; top:50%; right:20px; cursor:pointer;" width="40" height="20" viewBox="0 0 80 40">
      <polygon points="80,20 52,0 52,40" fill="white"/>
      <rect x="0" y="18" width="52" height="4" fill="white"/>
    </svg>

    <div class="gallery-area">
      <div class="my-image image-main" id="img-main"></div>
      <div class="my-image image-top-left"></div>
      <div class="my-image image-bottom-left"></div>
      <div class="my-image image-top-right"></div>
      <div class="my-image image-bottom-right"></div>
      <div class="my-image image-bottom-center1"></div>
      <div class="my-image image-bottom-center2"></div>
      <div class="white-box"></div>
    </div>

  </div>

  <script>

    var myCurrentColor = "color1";

    function goRight() {
      if (myCurrentColor == "color1") {
        document.getElementById("img-main").style.backgroundColor = "#336699";
        myCurrentColor = "color2";
      } else if (myCurrentColor == "color2") {
        document.getElementById("img-main").style.backgroundColor = "#222222";
        myCurrentColor = "color3";
      } else if (myCurrentColor == "color3") {
        document.getElementById("img-main").style.backgroundColor = "#cc4400";
        myCurrentColor = "color4";
      } else if (myCurrentColor == "color4") {
        document.getElementById("img-main").style.backgroundColor = "#226633";
        myCurrentColor = "color5";
      } else if (myCurrentColor == "color5") {
        document.getElementById("img-main").style.backgroundColor = "#888888";
        myCurrentColor = "color1";
      }
    }

    function goLeft() {
      if (myCurrentColor == "color1") {
        document.getElementById("img-main").style.backgroundColor = "#226633";
        myCurrentColor = "color5";
      } else if (myCurrentColor == "color2") {
        document.getElementById("img-main").style.backgroundColor = "#888888";
        myCurrentColor = "color1";
      } else if (myCurrentColor == "color3") {
        document.getElementById("img-main").style.backgroundColor = "#336699";
        myCurrentColor = "color2";
      } else if (myCurrentColor == "color4") {
        document.getElementById("img-main").style.backgroundColor = "#222222";
        myCurrentColor = "color3";
      } else if (myCurrentColor == "color5") {
        document.getElementById("img-main").style.backgroundColor = "#cc4400";
        myCurrentColor = "color4";
      }
    }

  </script>
</body>
</html>
