<!DOCTYPE html>
<html>
<head>
  <title>page31</title>

  <style>
    body {
      margin: 0;
      background: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .gallery {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    button {
      width: 50px;
      height: 50px;
      font-size: 30px;
      background: white;
      border: 1px solid black;
      cursor: pointer;
    }

    img {
      width: 500px;
      height: 350px;
      object-fit: cover;
      border: 1px solid black;
    }
  </style>
</head>

<body>

  <div class="gallery">
    <button onclick="prevPhoto()"><</button>

    <img id="photo" src="1.jpg">

    <button onclick="nextPhoto()">></button>
  </div>

  <script>
    var images = [
      "1.jpg",
      "2.jpg",
      "3.jpg",
      "4.jpg",
      "5.jpg",
      "6.jpg",
      "7.jpg",
      "8.jpg",
      "9.jpg",
      "10.jpg",
      "11.jpg",
      "12.jpg"
    ];

    var index = 0;
    var photo = document.getElementById("photo");

    function nextPhoto() {
      index = index + 1;

      if (index > 11) {
        index = 0;
      }

      photo.src = images[index];
    }

    function prevPhoto() {
      index = index - 1;

      if (index < 0) {
        index = 11;
      }

      photo.src = images[index];
    }
  </script>

</body>
</html>
