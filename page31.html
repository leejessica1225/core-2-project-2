<!DOCTYPE html>
<html>
<head>
  <title>page31</title>

  <style>
    body {
      margin: 0;
      background: #F6F7F1;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      align-items: center;
      gap: 50px;
    }

    button {
      background: none;
      border: none;
      font-size: 42px;
      cursor: pointer;
      color: black;
    }

    .container {
      width: 860px;
      overflow: hidden;
    }

    .gallery {
      display: flex;
      gap: 22px;
      transition: transform 0.3s ease;
    }

    img {
      width: 170px;
      height: 302px;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <button onclick="moveLeft()">&lt;</button>

    <div class="container">
      <div class="gallery" id="gallery">
        <img src="1.jpg">
        <img src="2.jpg">
        <img src="3.jpg">
        <img src="4.jpg">
        <img src="5.jpg">
        <img src="6.jpg">
        <img src="7.jpg">
        <img src="8.jpg">
        <img src="9.jpg">
        <img src="10.jpg">
        <img src="11.jpg">
        <img src="12.jpg">

        <img src="1.jpg">
        <img src="2.jpg">
        <img src="3.jpg">
        <img src="4.jpg">
        <img src="5.jpg">
        <img src="6.jpg">
        <img src="7.jpg">
        <img src="8.jpg">
        <img src="9.jpg">
        <img src="10.jpg">
        <img src="11.jpg">
        <img src="12.jpg">
      </div>
    </div>

    <button onclick="moveRight()">&gt;</button>
  </div>

  <script>
    var gallery = document.getElementById("gallery");
    var index = 0;
    var moveSize = 192;
    var startOffset = 96;

    function updateGallery() {
      gallery.style.transform = "translateX(" + (-index * moveSize - startOffset) + "px)";
    }

    function moveRight() {
      index = index + 1;

      if (index == 12) {
        index = 0;
      }

      updateGallery();
    }

    function moveLeft() {
      index = index - 1;

      if (index < 0) {
        index = 11;
      }

      updateGallery();
    }

    updateGallery();
  </script>
</body>
</html>
