<!DOCTYPE html>
<html>
<head>
  <title>page31</title>

  <style>
    body {
      margin: 0;
      background: white;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrapper {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .container {
      width: 800px;
      overflow: hidden;
    }

    .gallery {
      display: flex;
      gap: 20px;
      transition: 0.3s;
    }

    img {
      width: 180px;
      height: 250px;
      object-fit: cover;
    }

    button {
      font-size: 30px;
      background: none;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <button onclick="moveLeft()"><</button>

    <div class="container">
      <div class="gallery" id="gallery">
        <img src="1.jpg">
        <img src="2.jpg">
        <img src="3.jpg">
        <img src="4.jpg">
        <img src="5.jpg">
        <img src="6.jpg">
        <img src="7.jpg">
        <img src="8.jpg">
        <img src="9.jpg">
        <img src="10.jpg">
        <img src="11.jpg">
        <img src="12.jpg">
      </div>
    </div>

    <button onclick="moveRight()">></button>

  </div>

  <script>
    var gallery = document.getElementById("gallery");
    var x = 0;

    function moveRight() {
      x = x - 200;
      gallery.style.transform = "translateX(" + x + "px)";
    }

    function moveLeft() {
      x = x + 200;
      gallery.style.transform = "translateX(" + x + "px)";
    }
  </script>

</body>
</html>
