<!DOCTYPE html>
<html>
<head>
  <title>page31</title>

  <style>
    body {
      margin: 0;
      background: #F6F7F1;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    button {
      background: none;
      border: none;
      font-size: 40px;
      cursor: pointer;
    }

    .container {
      width: 900px;
      overflow: hidden;
      position: relative;
    }

    /* 좌우 흐림 효과 */
    .container::before,
    .container::after {
      content: "";
      position: absolute;
      top: 0;
      width: 100px;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .container::before {
      left: 0;
      background: linear-gradient(to right, #F6F7F1, transparent);
    }

    .container::after {
      right: 0;
      background: linear-gradient(to left, #F6F7F1, transparent);
    }

    .gallery {
      display: flex;
      gap: 20px;
    }

    img {
      width: 160px;
      height: 284px;
      object-fit: cover;
      flex-shrink: 0;
      transition: transform 0.3s;
    }

    /* hover 확대 */
    img:hover {
      transform: scale(1.15);
      z-index: 1;
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <button onclick="left()">&lt;</button>

    <div class="container">
      <div class="gallery" id="gallery">

        <img src="img1Small.jpeg">
        <img src="img2Small.jpeg">
        <img src="img3Small.jpeg">
        <img src="img4Small.jpeg">
        <img src="img5Small.jpeg">
        <img src="img6Small.jpeg">
        <img src="img7Small.jpeg">
        <img src="img8Small.jpeg">
        <img src="img9Small.jpeg">
        <img src="img10Small.jpeg">
        <img src="img11Small.jpeg">
        <img src="img12Small.jpeg">

      </div>
    </div>

    <button onclick="right()">&gt;</button>

  </div>

  <script>
    var gallery = document.getElementById("gallery");
    var size = 180;

    function right() {
      gallery.style.transition = "transform 0.3s";
      gallery.style.transform = "translateX(-" + size + "px)";

      setTimeout(function() {
        gallery.style.transition = "none";
        gallery.appendChild(gallery.firstElementChild);
        gallery.style.transform = "translateX(0)";
      }, 300);
    }

    function left() {
      gallery.style.transition = "none";
      gallery.insertBefore(gallery.lastElementChild, gallery.firstElementChild);
      gallery.style.transform = "translateX(-" + size + "px)";

      setTimeout(function() {
        gallery.style.transition = "transform 0.3s";
        gallery.style.transform = "translateX(0)";
      }, 10);
    }
  </script>

</body>
</html>
