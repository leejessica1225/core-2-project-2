<!DOCTYPE html>
<html>
<head>
  <title>page31</title>

  <style>
    body {
      margin: 0;
      background: #F6F7F1;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    button {
      background: none;
      border: none;
      font-size: 40px;
      cursor: pointer;
    }

    .container {
      width: 900px;
      overflow: hidden;
    }

    .gallery {
      display: flex;
      gap: 20px;
      transition: transform 0.3s;
    }

    img {
      width: 160px;
      height: 284px;
      object-fit: cover;
      flex-shrink: 0;
      display: block;
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <button onclick="left()">&lt;</button>

    <div class="container">
      <div class="gallery" id="gallery">

        <img src="img1Small.jpeg">
        <img src="img2Small.jpeg">
        <img src="img3Small.jpeg">
        <img src="img4Small.jpeg">
        <img src="img5Small.jpeg">
        <img src="img6Small.jpeg">
        <img src="img7Small.jpeg">
        <img src="img8Small.jpeg">
        <img src="img9Small.jpeg">
        <img src="img10Small.jpeg">
        <img src="img11Small.jpeg">
        <img src="img12Small.jpeg">

        <img src="img1Small.jpeg">
        <img src="img2Small.jpeg">
        <img src="img3Small.jpeg">
        <img src="img4Small.jpeg">
        <img src="img5Small.jpeg">
        <img src="img6Small.jpeg">
        <img src="img7Small.jpeg">
        <img src="img8Small.jpeg">
        <img src="img9Small.jpeg">
        <img src="img10Small.jpeg">
        <img src="img11Small.jpeg">
        <img src="img12Small.jpeg">

      </div>
    </div>

    <button onclick="right()">&gt;</button>

  </div>

  <script>
    var gallery = document.getElementById("gallery");
    var index = 0;
    var size = 180;
    var offset = 90;

    function update() {
      gallery.style.transform = "translateX(" + (-index * size - offset) + "px)";
    }

    function right() {
      index = index + 1;
      if (index == 12) {
        index = 0;
      }
      update();
    }

    function left() {
      index = index - 1;
      if (index < 0) {
        index = 11;
      }
      update();
    }

    update();
  </script>

</body>
</html>
