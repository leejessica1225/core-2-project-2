<!DOCTYPE html>
<html>
<head>
  <title>page31</title>

  <style>
    body {
      margin: 0;
      background: #F6F7F1;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .wrapper {
      display: flex;
      align-items: center;
      gap: 50px;
    }

    button {
      background: none;
      border: none;
      font-size: 42px;
      cursor: pointer;
      color: black;
    }

    .container {
      width: 860px;
      overflow: hidden;
    }

    .gallery {
      display: flex;
      gap: 20px;
      transition: transform 0.3s ease;
    }

    img {
      width: 170px;
      height: 302px;
      object-fit: cover;
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <button onclick="left()">&lt;</button>

    <div class="container">
      <div class="gallery" id="gallery">

        <img src="8DCBE729-968A-44F7-9D3B-3E05B3D5E006 2 copy.jpg">
        <img src="IMG_6573 copy.jpg">
        <img src="IMG_6777 copy.jpg">
        <img src="IMG_6829 copy.jpg">
        <img src="IMG_6920 copy.jpg">
        <img src="IMG_8433 2 copy.jpg">
        <img src="IMG_6402 copy.jpg">
        <img src="IMG_2224 copy.jpg">
        <img src="IMG_1633 2 copy.jpg">
        <img src="IMG_1482 copy.jpg">
        <img src="IMG_0029 copy.jpg">
        <img src="IMG_1213 2 copy.jpg">

        <img src="8DCBE729-968A-44F7-9D3B-3E05B3D5E006 2 copy.jpg">
        <img src="IMG_6573 copy.jpg">
        <img src="IMG_6777 copy.jpg">
        <img src="IMG_6829 copy.jpg">
        <img src="IMG_6920 copy.jpg">
        <img src="IMG_8433 2 copy.jpg">
        <img src="IMG_6402 copy.jpg">
        <img src="IMG_2224 copy.jpg">
        <img src="IMG_1633 2 copy.jpg">
        <img src="IMG_1482 copy.jpg">
        <img src="IMG_0029 copy.jpg">
        <img src="IMG_1213 2 copy.jpg">

      </div>
    </div>

    <button onclick="right()">&gt;</button>

  </div>

  <script>
    var gallery = document.getElementById("gallery");
    var index = 0;
    var size = 190;
    var offset = 95;

    function update() {
      gallery.style.transform = "translateX(" + (-index * size - offset) + "px)";
    }

    function right() {
      index = index + 1;
      if (index == 12) {
        index = 0;
      }
      update();
    }

    function left() {
      index = index - 1;
      if (index < 0) {
        index = 11;
      }
      update();
    }

    update();
  </script>

</body>
</html>
