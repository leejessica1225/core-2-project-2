<!DOCTYPE html>
<html>
<head>
  <title>page51</title>

  <style>
    body {
      margin: 0;
      background: #0900CF;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      position: relative;
    }

    .bottom-area {
      position: absolute;
      left: 50%;
      bottom: 70px;
      transform: translateX(-50%);
      text-align: center;
      width: 100%;
    }

    .type-box {
      width: 420px;
      height: 50px;
      border: 1px solid white;
      background: transparent;
      color: white;
      padding: 10px;
      font-size: 18px;
      box-sizing: border-box;
      outline: none;
    }

    .choices {
      margin-top: 18px;
      font-size: 18px;
      word-spacing: 20px;
    }
  </style>
</head>

<body>

  <div class="bottom-area">
    <input type="text" class="type-box">

    <div class="choices">
      apple cat figure glasses
    </div>
  </div>

</body>
</html>
