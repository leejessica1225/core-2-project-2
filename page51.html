<!DOCTYPE html>
<html>
<head>
  <title>page31</title>

  <style>
    @font-face {
      font-family: 'arialNarrow';
      src: url('Arial Narrow Regular.ttf');
    }

    body {
      margin: 0;
      background: #0900CF;
      height: 100vh;
      font-family: 'arialNarrow', Arial, sans-serif;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .bottom-area {
      position: absolute;
      left: 50%;
      bottom: 160px;
      transform: translateX(-50%);
      text-align: center;
      width: 100%;
    }

    .type-box {
      width: 520px;
      height: 65px;
      border: 1px solid white;
      background: transparent;
      color: white;
      padding: 12px;
      font-size: 22px;
      box-sizing: border-box;
      outline: none;
      text-align: center;
    }

    .choices {
      position: relative;
      top: 40px;
      font-size: 22px;
      word-spacing: 40px;
    }

    .floating {
      position: absolute;
      animation: float 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-30px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>

<body>

  <div class="bottom-area">
    <input type="text" class="type-box" id="typeBox">

    <div class="choices">
      apple cat figure glasses
    </div>
  </div>

  <script>
    var input = document.getElementById("typeBox");

    input.addEventListener("input", function() {
      input.value = input.value.toLowerCase();
    });

    input.addEventListener("keydown", function(event) {

      if (event.key == "Enter") {

        var images = [];

        if (input.value == "apple") {
          images = [
            "apple1.png","apple2.png","apple3.png","apple4.png",
            "apple5.png","apple6.png","apple7.png"
          ];
        }

        if (input.value == "cat") {
          images = [
            "cat1.png","cat2.png","cat3.png","cat4.png","cat5.png"
          ];
        }

        if (input.value == "human") {
          images = [
            "human1.png","human2.png","human3.png","human4.png","human5.png"
          ];
        }

        if (input.value == "glasses") {
          images = [
            "glasses1.png","glasses2.png","glasses3.png","glasses4.png",
            "glasses5.png","glasses6.png","glasses7.png","glasses8.png"
          ];
        }

        for (var i = 0; i < images.length; i++) {

          var img = document.createElement("img");
          img.src = images[i];
          img.className = "floating";

          img.style.left = Math.random() * 90 + "%";
          img.style.top = Math.random() * 70 + "%";
          img.style.width = 140 + Math.random() * 120 + "px";

          document.body.appendChild(img);
        }

      }

    });
  </script>

</body>
</html>
