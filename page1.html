<!DOCTYPE html>
<html>
<head>
  <title>Retro Loading</title>

  <style>
    @font-face {
      font-family: 'DepartureMono';
      src: url('DepartureMono-Regular.otf') format('opentype');
    }

    body {
      background: black;
      margin: 0;
      font-family: 'DepartureMono', monospace;
      color: #66F6BB;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loading-box {
      width: 850px;
    }

    .top-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .top-text {
      font-size: 40px;
    }

    #percent {
      font-size: 28px;
    }

    .bar-box {
      width: 850px;
      margin: auto;
    }

    progress {
      width: 100%;
      height: 65px;
      border: 6px solid #66F6BB;
      background: black;
      padding: 6px;
    }

    progress::-webkit-progress-bar {
      background: black;
    }

    progress::-webkit-progress-value {
      background: repeating-linear-gradient(
        to right,
        #66F6BB 0px,
        #66F6BB 20px,
        black 20px,
        black 30px
      );
    }
  </style>
</head>

<body>

  <div class="loading-box">
    <div class="top-line">
      <div class="top-text">Loading</div>
      <div id="percent">0%</div>
    </div>

    <div class="bar-box">
      <progress id="bar" value="0" max="100"></progress>
    </div>
  </div>

  <script>
    var bar = document.getElementById("bar");
    var percent = document.getElementById("percent");

    var num = 0;

    function move() {
      if (num < 100) {
        num = num + 1;
        bar.value = num;
        percent.innerText = num + "%";
        setTimeout(move, 80);
      }
    }

    move();
  </script>

</body>
</html>
