<!DOCTYPE html>
<html>
<head>
  <title>Retro Loading</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      background: black;
      margin: 0;
      font-family: 'Press Start 2P', monospace;
      color: #66F6BB;
    }

    .loading-box {
      width: 850px;
      margin: 200px auto;
    }

    .top-text {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .bar-box {
      position: relative;
      width: 850px;
      margin: auto;
    }

    progress {
      width: 100%;
      height: 65px;
      border: 6px solid #66F6BB;
      background: black;
      padding: 6px;
    }

    progress::-webkit-progress-bar {
      background: black;
    }

    progress::-webkit-progress-value {
      background: repeating-linear-gradient(
        to right,
        #66F6BB 0px,
        #66F6BB 20px,
        black 20px,
        black 30px
      );
    }

    #percent {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="loading-box">
    <div class="top-text">Loading</div>

    <div class="bar-box">
      <progress id="bar" value="0" max="100"></progress>
      <span id="percent">0%</span>
    </div>
  </div>

  <script>
    let bar = document.getElementById("bar");
    let percent = document.getElementById("percent");

    let num = 0;

    function move() {
      if (num < 100) {
        num = num + 1;
        bar.value = num;
        percent.innerText = num + "%";
        setTimeout(move, 80);
      }
    }

    move();
  </script>

</body>
</html>
