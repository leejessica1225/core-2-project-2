<!DOCTYPE html>
<html>
<head>
  <title>ready</title>

  <style>
    @font-face {
      font-family: 'DepartureMono';
      src: url('DepartureMono-Regular.otf') format('opentype');
    }

    body {
      margin: 0;
      background: black;
      color: #66F6BB;
      font-family: 'DepartureMono', monospace;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      width: 320px;
      transform: translateX(1px);
    }

    .line1 {
      height: 80px;
      font-size: 60px;
      display: flex;
      align-items: center;
      margin-bottom: 30px;
    }

    .line2 {
      height: 80px;
      font-size: 60px;
      display: flex;
      align-items: center;
    }

    #typing {
      display: inline-block;
    }

    input {
      border: none;
      outline: none;
      background: transparent;
      color: #66F6BB;
      font-size: 60px;
      font-family: 'DepartureMono';
      width: 200px;
    }

    .cursor {
      width: 24px;
      height: 60px;
      background: #66F6BB;
      margin-left: 10px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% {opacity: 1;}
      50% {opacity: 0;}
      100% {opacity: 1;}
    }

    #inputLine {
      display: none;
    }
  </style>
</head>

<body>

  <div class="box">

    <div class="line1">
      <div id="typing"></div>
      <div class="cursor" id="cursorTop"></div>
    </div>

    <div class="line2" id="inputLine">
      <input id="answer" type="text" autocomplete="off">
      <div class="cursor"></div>
    </div>

  </div>

  <script>
    var text = "READY?";
    var i = 0;
    var started = false;

    function type() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i = i + 1;
        setTimeout(type, 100);
      }
    }

    type();

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && started === false) {
        started = true;

        document.getElementById("cursorTop").style.display = "none";
        document.getElementById("inputLine").style.display = "flex";

        document.getElementById("answer").focus();
      }
    });

    document.getElementById("answer").oninput = function() {
      this.value = this.value.toUpperCase();
    };

    document.getElementById("answer").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        if (this.value === "YES") {
          window.location.href = "page12.html";
        }
      }
    });
  </script>

</body>
</html>
