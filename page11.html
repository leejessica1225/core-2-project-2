<!DOCTYPE html>
<html>
<head>
  <title>Page 11</title>

  <style>
    @font-face {
      font-family: 'DepartureMono';
      src: url('DepartureMono-Regular.otf') format('opentype');
    }

    body {
      background: black;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'DepartureMono', monospace;
      color: #66F6BB;
    }

    .container {
      width: 500px;
      text-align: left;
    }

    .line1 {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
      font-size: 60px;
      height: 70px;
    }

    .line2 {
      display: flex;
      align-items: center;
      font-size: 60px;
      height: 70px;
    }

    #typing {
      min-width: 280px;
    }

    .cursor {
      width: 24px;
      height: 60px;
      background: #66F6BB;
      margin-left: 10px;
      animation: blink 1s infinite;
    }

    .cursor2 {
      width: 24px;
      height: 60px;
      background: #66F6BB;
      margin-left: 10px;
      animation: blink 1s infinite;
      display: none;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    #answer {
      opacity: 0;
      width: 1px;
      height: 1px;
      border: none;
      outline: none;
      position: absolute;
    }

    #typedText {
      display: none;
      min-width: 180px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="line1">
      <div id="typing"></div>
      <div class="cursor" id="cursorTop"></div>
    </div>

    <div class="line2">
      <div id="typedText"></div>
      <div class="cursor2" id="cursorBottom"></div>
    </div>
  </div>

  <input id="answer" type="text" autocomplete="off">

  <script>
    var text = "READY?";
    var i = 0;

    function type() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 100);
      }
    }

    type();

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        document.getElementById("cursorTop").style.display = "none";
        document.getElementById("typedText").style.display = "inline-block";
        document.getElementById("cursorBottom").style.display = "inline-block";
        document.getElementById("answer").focus();
      }
    });

    document.getElementById("answer").oninput = function() {
      this.value = this.value.toUpperCase();
      document.getElementById("typedText").innerHTML = this.value;
    };

    document.getElementById("answer").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        if (this.value === "YES") {
          window.location.href = "page12.html";
        }
      }
    });
  </script>

</body>
</html>
