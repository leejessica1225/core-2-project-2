<!DOCTYPE html>
<html>
<head>
  <title>Page 11</title>

  <style>
    @font-face {
      font-family: 'DepartureMono';
      src: url('DepartureMono-Regular.otf') format('opentype');
    }

    body {
      margin: 0;
      background: black;
      color: #66F6BB;
      font-family: 'DepartureMono', monospace;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      width: 320px;
    }

    .line1 {
      height: 80px;
      font-size: 60px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 30px;
    }

    .line2 {
      height: 80px;
      font-size: 60px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    #typing {
      display: inline-block;
    }

    #typedText {
      display: none;
    }

    .cursor2 {
      width: 24px;
      height: 60px;
      background: #66F6BB;
      margin-left: 0;
      animation: blink 1s infinite;
      display: none;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    #answer {
      opacity: 0;
      position: absolute;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="box">
    <div class="line1">
      <div id="typing"></div>
    </div>

    <div class="line2">
      <div id="typedText"></div>
      <div class="cursor2" id="cursorBottom"></div>
    </div>
  </div>

  <input id="answer" type="text" autocomplete="off">

  <script>
    var text = "READY?";
    var i = 0;
    var started = false;

    function type() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML = text.substring(0, i + 1) + "■";
        i = i + 1;
        setTimeout(type, 100);
      } else {
        document.getElementById("typing").innerHTML = text + "■";
      }
    }

    type();

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter" && started === false) {
        started = true;
        document.getElementById("typing").innerHTML = text;
        document.getElementById("typedText").style.display = "block";
        document.getElementById("cursorBottom").style.display = "block";
        document.getElementById("answer").focus();
      }
    });

    document.getElementById("answer").oninput = function() {
      this.value = this.value.toUpperCase();
      document.getElementById("typedText").innerHTML = this.value;
    };

    document.getElementById("answer").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        if (this.value === "YES") {
          window.location.href = "page12.html";
        }
      }
    });
  </script>

</body>
</html>
