<!DOCTYPE html>
<html>
<head>
  <title>ready</title>

  <style>
    @font-face {
      font-family: 'DepartureMono';
      src: url('DepartureMono-Regular.otf') format('opentype');
    }

    body {
      background: black;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'DepartureMono', monospace;
      color: #66F6BB;
    }

    .container {
      text-align: center;
    }

    .line {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 30px;
    }

    .text {
      font-size: 60px;
    }

    .cursor {
      width: 24px;
      height: 60px;
      background: #66F6BB;
      margin-left: 10px;
      animation: blink 1s infinite;
    }

    .cursor2 {
      width: 24px;
      height: 60px;
      background: #66F6BB;
      margin-right: 10px;
      animation: blink 1s infinite;
      display: none;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    input {
      background: black;
      border: none;
      color: #66F6BB;
      font-family: 'DepartureMono', monospace;
      font-size: 60px;
      outline: none;
      text-align: left;
      width: 220px;
      caret-color: transparent;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="line">
      <div class="text" id="typing"></div>
      <div class="cursor" id="cursorTop"></div>
    </div>

    <div class="line">
      <div class="cursor2" id="cursorBottom"></div>
      <input id="answer" type="text" autocomplete="off">
    </div>

  </div>

  <script>
    var text = "READY?";
    var i = 0;

    function type() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 100);
      }
    }

    type();

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        document.getElementById("cursorTop").style.display = "none";
        document.getElementById("cursorBottom").style.display = "inline-block";
        document.getElementById("answer").style.display = "inline-block";
        document.getElementById("answer").focus();
      }
    });

    document.getElementById("answer").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        if (this.value.toUpperCase() === "YES") {
          window.location.href = "page12.html";
        }
      }
    });

    document.getElementById("answer").oninput = function() {
      this.value = this.value.toUpperCase();
    };
  </script>

</body>
</html>
