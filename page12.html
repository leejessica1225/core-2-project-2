<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Page 12</title>

  <style>
    @font-face {
      font-family: 'DepartureMono';
      src: url('DepartureMono-Regular.otf') format('opentype');
    }

    body {
      margin: 0;
      background: black;
      color: #66F6BB;
      font-family: 'DepartureMono', monospace;
      font-size: 22px;
      padding: 40px;
    }

    #screen {
      white-space: pre-line;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div id="screen"></div>

  <script>
    const text = `MONITOR READY.
> load fish.img

IMAGE RECOVERED.
MULTIPLE LIFE-FORMS DETECTED.
STATUS: SWIMMING

Small bodies moving together.
Silver light flickers.
Movement: slow and endless.

They drift as one.
Like they belong here.

WILL YOU CONTINUE?
YES
NO`;

    let i = 0;
    const speed = 35;
    const screen = document.getElementById("screen");

    function typeText() {
      if (i < text.length) {
        screen.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, speed);
      }
    }

    typeText();
  </script>
</body>
</html>
