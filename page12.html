<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Page 12</title>

  <style>
    @font-face {
      font-family: 'DepartureMono';
      src: url('DepartureMono-Regular.otf');
    }

    body {
      background: black;
      color: #66F6BB;
      font-family: 'DepartureMono';
      font-size: 22px;
      padding: 30px;
    }

    #screen {
      white-space: pre-line;
      line-height: 1.5;
    }

    .line {
      margin-left: 30px;
      margin-top: 10px;
    }

    button {
      background: none;
      border: none;
      color: #66F6BB;
      font-family: 'DepartureMono';
      font-size: 22px;
      cursor: pointer;
    }

    /* 🔥 자리 미리 차지 */
    .arrow {
      display: inline-block;
      width: 20px;
      visibility: hidden;
    }
  </style>
</head>

<body>

<div id="screen"></div>

<div id="choices" style="display:none;">
  <div class="line">
    <span id="arrow1" class="arrow">▶</span>
    <button onclick="clickYes()">YES</button>
  </div>

  <div class="line">
    <span id="arrow2" class="arrow">▶</span>
    <button onclick="clickNo()">NO</button>
  </div>
</div>

<script>

var text = `MONITOR READY.
> load fish.img

IMAGE RECOVERED.
MULTIPLE LIFE-FORMS DETECTED.
STATUS: SWIMMING

Small bodies moving together.
Silver light flickers.
Movement: slow and endless.

They drift as one.
Like they belong here.

WILL YOU CONTINUE?`;

var i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("screen").innerHTML += text[i];
    i++;
    setTimeout(typing, 30);
  } else {
    document.getElementById("choices").style.display = "block";
  }
}

function clickYes() {
  document.getElementById("arrow1").style.visibility = "visible";
  document.getElementById("arrow2").style.visibility = "hidden";

  setTimeout(function() {
    window.location.href = "page13.html";
  }, 500);
}

function clickNo() {
  document.getElementById("arrow1").style.visibility = "hidden";
  document.getElementById("arrow2").style.visibility = "visible";
}

typing();

</script>

</body>
</html>
