<!DOCTYPE html>
<html>
<head>
  <title>Search Page</title>

  <style>
    @font-face {
      font-family: 'cactus';
      src: url('Cactus-Jack.ttf');
    }

    body {
      background-color: #fdfcf7;
      height: 100vh;
      margin: 0;
      font-size: 32px;
      position: relative;
      font-family: 'cactus';
    }

    .box {
      width: 400px;
      border: 2px solid black;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fdfcf7;
      z-index: 10;
    }

    input {
      border: none;
      outline: none;
      font-size: 32px;
      width: 70%;
      background: transparent;
      font-family: 'cactus';
    }

    button {
      border: none;
      background: none;
      font-size: 32px;
      cursor: pointer;
      font-family: 'cactus';
      padding: 0;
    }

    .random-img {
      position: absolute;
      width: 140px;
    }

    .clear {
      position: fixed;
      right: 140px;
      bottom: 40px;
      font-size: 32px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'cactus';
      color: black;
    }

    .home {
      position: fixed;
      right: 40px;
      bottom: 40px;
      text-decoration: none;
      color: black;
      font-size: 32px;
      font-family: 'cactus';
    }
  </style>
</head>

<body>

  <div class="box" id="box">
    <input id="text" type="text" placeholder="type scribble...">
    <button onclick="go()">go!</button>
  </div>

  <button onclick="clearImages()" class="clear">clear</button>

  <a href="index.html" class="home">home</a>

  <script>
    function go() {
      var word = document.getElementById("text").value;

      if (word !== "scribble") {
        return;
      }

      var images = [
        "Group 60.png",
        "Group 61.png",
        "Group 62.png",
        "Group 63.png",
        "Group 64.png",
        "Group 65.png"
      ];

      var randomIndex = Math.floor(Math.random() * images.length);
      var chosenImage = images[randomIndex];

      var img = document.createElement("img");
      img.src = chosenImage;
      img.className = "random-img";

      var screenWidth = window.innerWidth;
      var screenHeight = window.innerHeight;

      var box = document.getElementById("box");
      var rect = box.getBoundingClientRect();

      var x, y;

      do {
        x = Math.random() * (screenWidth - 140);
        y = Math.random() * (screenHeight - 140);
      } while (
        x < rect.right &&
        x + 140 > rect.left &&
        y < rect.bottom &&
        y + 140 > rect.top
      );

      img.style.left = x + "px";
      img.style.top = y + "px";

      document.body.appendChild(img);
    }

    function clearImages() {
      var allImages = document.querySelectorAll(".random-img");

      for (var i = 0; i < allImages.length; i++) {
        allImages[i].remove();
      }
    }
  </script>

</body>
</html>
