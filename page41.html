<!DOCTYPE html>
<html>
<head>
  <title>Page 41</title>

  <style>
    @font-face {
      font-family: 'Romantic';
      src: url('ROMANTIC.TTF');
    }

    body {
      margin: 0;
      background-image: url("59067254a59f3ff15c59d062832650a2 (1).jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      font-family: 'Romantic', Arial;
    }

    .box {
      width: 700px;
      padding: 25px;
      background: rgba(255, 255, 255, 0.5);
      border: 2px solid white;
      border-radius: 40px;

      position: absolute;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
    }

    #text {
      white-space: pre-line;
      font-size: 26px;
      line-height: 1.6;
      color: #333;
      height: 140px;
    }

    .input-box {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      font-size: 20px;
      border: none;
      background: rgba(255, 255, 255, 0.6);
      color: #333;
      outline: none;
      font-family: 'Romantic';
    }

    .input-box::placeholder {
      color: #555;
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="box">
    <div id="text"></div>
    <input 
      type="text" 
      id="input" 
      class="input-box" 
      placeholder="type what you want to find"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >
  </div>

  <script>
    var message = "there is something in the distance.\n\nnot lost.\nnot found.\n\njust... waiting.";
    var i = 0;

    function typeText() {
      if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeText, 60);
      }
    }

    typeText();

    document.getElementById("input").addEventListener("keydown", function(event) {
      if (event.key == "Enter") {
        setTimeout(function() {
          window.location.href = "page44.html";
        }, 500);
      }
    });
  </script>

</body>
</html>
