<!DOCTYPE html>
<html>
<head>
  <title>Page 41</title>

  <style>
    body {
      margin: 0;
      background-image: url("59067254a59f3ff15c59d062832650a2 (1).jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: Arial;
    }

    .box {
      width: 600px;
      padding: 30px;
      border: 2px solid white;
      background: rgba(0,0,0,0.4);
    }

    #text {
      white-space: pre-line;
      font-size: 28px;
      line-height: 1.6;
      min-height: 260px;
    }

    .input-box {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      font-size: 22px;
      border: 2px solid white;
      background: transparent;
      color: white;
    }
  </style>
</head>

<body>

  <div class="box">
    <div id="text"></div>
    <input id="input" class="input-box" placeholder="type what you want to find">
  </div>

  <script>
    var message = "there is something in the distance.\n\nnot lost.\nnot found.\n\njust... waiting.";
    var i = 0;

    function typeText() {
      if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeText, 60);
      }
    }

    typeText();

    document.getElementById("input").addEventListener("keydown", function(event) {
      if (event.key == "Enter") {
        setTimeout(function() {
          window.location.href = "page44.html";
        }, 500);
      }
    });
  </script>

</body>
</html>
