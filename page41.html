<!DOCTYPE html>
<html>
<head>
  <title>Page 41</title>

  <style>
    @font-face {
      font-family: 'Romantic';
      src: url('ROMANTIC.TTF');
    }

    body {
      margin: 0;
      background-image: url("59067254a59f3ff15c59d062832650a2 (1).jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      font-family: 'Romantic', Arial, sans-serif;
      position: relative;
      overflow: hidden;
    }

    .box {
      width: 820px;
      height: 300px;
      padding: 30px;
      box-sizing: border-box;
      background: rgba(80, 90, 120, 0.45);
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 40px;

      position: absolute;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
    }

    #text {
      white-space: pre-line;
      font-size: 28px;
      line-height: 1.8;
      color: white;
      height: 170px;
      margin: 0;
    }

    .input-box {
      width: 100%;
      height: 50px;
      margin-top: 10px;
      padding: 0 14px;
      box-sizing: border-box;
      border: none;
      background: rgba(255, 255, 255, 0.18);
      color: white;
      font-size: 24px;
      font-family: 'Romantic', Arial, sans-serif;
      outline: none;
    }

    .input-box::placeholder {
      color: white;
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="box">
    <div id="text"></div>
    <input
      type="text"
      id="input"
      class="input-box"
      placeholder="type what you want to find"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >
  </div>

  <script>
    var message = "there is something in the distance.\n\nnot lost.\nnot found.\n\njust... waiting.";
    var i = 0;
    var text = document.getElementById("text");
    var input = document.getElementById("input");

    function typeText() {
      if (i < message.length) {
        text.innerHTML = text.innerHTML + message.charAt(i);
        i = i + 1;
        setTimeout(typeText, 60);
      }
    }

    typeText();

    input.addEventListener("keydown", function(event) {
      if (event.key == "Enter") {
        setTimeout(function() {
          window.location.href = "page44.html";
        }, 500);
      }
    });
  </script>

</body>
</html>
