<!DOCTYPE html>
<html>
<head>
  <title>Loading Page</title>

  <style>
    body {
      margin: 0;
      background: white;
      color: #0900CF;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    img {
      width: 200px;
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
    }

    button {
      position: absolute;
      top: 75%;
      left: 50%;
      transform: translate(-50%, -50%);

      background: none;
      border: none;
      color: #0900CF;
      font-size: 22px;
      cursor: pointer;
    }

    progress {
      display: none;
    }
  </style>
</head>

<body>

  <img src="apple.png" class="frame">
  <img src="cat.png" class="frame">
  <img src="human.png" class="frame">
  <img src="glasses.png" class="frame">

  <button onclick="goNext()">[enter]</button>

  <progress id="bar" value="0" max="4"></progress>

  <script>
    var frames = document.getElementsByClassName("frame");
    var bar = document.getElementById("bar");

    setInterval(function() {

      for (var i = 0; i < frames.length; i++) {
        frames[i].style.display = "none";
      }

      frames[bar.value].style.display = "block";

      bar.value = bar.value + 1;

      if (bar.value == frames.length) {
        bar.value = 0;
      }

    }, 120);

    function goNext() {
      setTimeout(function() {
        window.location.href = "page31.html";
      }, 500);
    }
  </script>

</body>
</html>
