<!DOCTYPE html>
<html>
<head>
  <title>Loading Page</title>

  <style>
    @font-face {
      font-family: 'arialNarrow';
      src: url('Arial Narrow Regular.ttf');
    }

    body {
      margin: 0;
      background: white;
      color: #0900CF;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: 'arialNarrow', Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    img {
      width: 200px;
      display: none;
    }

    button {
      background: none;
      border: none;
      color: #0900CF;
      cursor: pointer;

      font-family: 'arialNarrow', Arial, sans-serif;
      font-size: 22px;
    }

    button:focus {
      outline: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="apple.png" class="frame">
    <img src="cat.png" class="frame">
    <img src="human.png" class="frame">
    <img src="glasses.png" class="frame">

    <button onclick="goNext()">[enter]</button>
  </div>

  <script>
    var frames = document.getElementsByClassName("frame");
    var i = 0;

    function changeImage() {
      for (var j = 0; j < frames.length; j++) {
        frames[j].style.display = "none";
      }

      frames[i].style.display = "block";

      i++;

      if (i >= frames.length) {
        i = 0;
      }
    }

    setInterval(changeImage, 120);

    function goNext() {
      setTimeout(function() {
        window.location.href = "page31.html";
      }, 500);
    }
  </script>

</body>
</html>
